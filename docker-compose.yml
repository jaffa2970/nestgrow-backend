services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: nestgrow-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  db:
    image: mariadb:11
    container_name: nestgrow-db
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: nestgrow_db
      MARIADB_USER: nestgrow
      MARIADB_PASSWORD: nestgrow
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestgrow-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_URL: mysql+aiomysql://nestgrow:nestgrow@db/nestgrow_db
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nestgrow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mariadb_data:
  mosquitto_data:
